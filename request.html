<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Make Your Own Pic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #081b41;
        --blue: #1565c0;
        --yellow: #ffd54f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #f8fbff 0%, #eaf4ff 100%);
        color: #13243f;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(620px, 100%);
        background: white;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(8, 27, 65, 0.14);
        padding: 32px;
      }

      h1 {
        margin-top: 0;
        color: var(--navy);
      }

      p {
        color: #5d6b80;
        margin-bottom: 16px;
      }

      form {
        display: grid;
        gap: 14px;
      }

      label {
        font-weight: 600;
        color: var(--navy);
      }

      input,
      textarea,
      button {
        font: inherit;
        border-radius: 12px;
        border: 1px solid #d8e6f5;
        padding: 12px 14px;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      button {
        background: var(--blue);
        color: white;
        font-weight: 700;
        border: none;
        cursor: pointer;
      }

      .back-link {
        display: inline-block;
        margin-top: 16px;
        color: var(--blue);
        text-decoration: none;
        font-weight: 600;
      }

      .success {
        margin-top: 14px;
        color: #0b7a2a;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Make Your Own Pic</h1>
      <p>Tell us what you want, and we will review your request through the Discord community.</p>
      <form id="request-form" action="https://formsubmit.co/darealgriddy@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="Pics4U custom request" />
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_next" value="request-confirmation.html" />
        <input type="hidden" name="_template" value="table" />

        <label for="name">Your name</label>
        <input id="name" name="name" type="text" placeholder="Enter your name" required />

        <label for="description">Picture description</label>
        <textarea id="description" name="description" placeholder="Describe the pic you want..." required></textarea>

        <button type="submit">Send Request</button>
      </form>
      <p class="success" id="success-msg"></p>
      <a class="back-link" href="pics4u.html">Back to store</a>
    </div>

    <script>
      const form = document.getElementById('request-form');
      const successMsg = document.getElementById('success-msg');

      form.addEventListener('submit', function (event) {
        if (location.protocol === 'file:') {
          event.preventDefault();

          const name = document.getElementById('name').value.trim();
          const description = document.getElementById('description').value.trim();

          if (!name || !description) {
            successMsg.textContent = 'Please fill in both fields before sending.';
            return;
          }

          const subject = encodeURIComponent(`Pics4U custom request from ${name}`);
          const body = encodeURIComponent(`Name: ${name}\n\nPicture request:\n${description}`);
          window.location.href = `mailto:darealgriddy@gmail.com?subject=${subject}&body=${body}`;
        }
      });
    </script>
  </body>
</html>
