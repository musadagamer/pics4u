<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Request Sent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #081b41;
        --blue: #1565c0;
        --yellow: #ffd54f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #f8fbff 0%, #eaf4ff 100%);
        color: #13243f;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(620px, 100%);
        background: white;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(8, 27, 65, 0.14);
        padding: 32px;
        text-align: center;
      }

      h1 {
        color: var(--navy);
      }

      p {
        color: #5d6b80;
        line-height: 1.7;
      }

      .btn {
        display: inline-block;
        margin-top: 16px;
        padding: 12px 20px;
        background: var(--blue);
        color: white;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Request Sent!</h1>
      <p>Your custom picture request has been sent successfully.</p>
      <p>The owner will reply through email within 1 to 4 days.</p>
      <a class="btn" href="pics4u.html">Back to store</a>
    </div>
  </body>
</html>
